name: Build

# Build-only CI. Compiles the full solution to catch regressions; does NOT run
# tests (tests need a live Visio install, which requires a self-hosted runner --
# that's planned for Phase 3 when releases are also automated).
#
# Pinned to VS 2022's MSBuild because the .NET Framework 4.5.2 reference
# assemblies needed to build the shipping libs are not resolved by VS 2026's
# MSBuild. See docs/BUILDING.md and docs/FUTURES.md.

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build (Debug)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild (Visual Studio 2022)
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      # The shipping libraries target .NET Framework 4.5.2, whose reference
      # assemblies are not present on the windows-latest runner image.
      # Install the 4.5.2 Developer Pack via Chocolatey, which is
      # pre-installed on the runner.
      # Phase 3 will bump these projects to 4.7.2 (in-box on every
      # supported Windows) and this step can be deleted.
      - name: Install .NET Framework 4.5.2 Developer Pack
        run: choco install netfx-4.5.2-devpack -y --no-progress

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: VisioAutomation_2010/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('VisioAutomation_2010/**/packages.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore NuGet packages
        run: msbuild VisioAutomation_2010\VisioAutomation2010.sln -t:Restore -p:RestorePackagesConfig=true

      - name: Build solution
        run: msbuild VisioAutomation_2010\VisioAutomation2010.sln -p:Configuration=Debug -m
