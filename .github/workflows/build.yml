name: Build

# Build-only CI. Compiles the full solution to catch regressions; does NOT run
# tests (tests need a live Visio install, which requires a self-hosted runner --
# that's planned for Phase 3 when releases are also automated).
#
# Pinned to VS 2022's MSBuild because the .NET Framework 4.5.2 reference
# assemblies needed to build the shipping libs are not resolved by VS 2026's
# MSBuild. See docs/BUILDING.md and docs/futures/build-and-code.md.

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build (Debug)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild (Visual Studio 2022)
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      # NOTE: the .NET Framework 4.5.2 dev-pack install step is deliberately
      # absent. The shipping libs still target net452, but the reference
      # assemblies are now supplied by the Microsoft.NETFramework.ReferenceAssemblies.net452
      # NuGet package (declared in VisioAutomation_2010/Directory.Packages.props).
      # That package's .targets sets TargetFrameworkRootPath to its own folder,
      # so MSBuild no longer needs the dev pack on disk.

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('VisioAutomation_2010/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore NuGet packages
        run: msbuild VisioAutomation_2010\VisioAutomation2010.sln -t:Restore

      - name: Build solution
        run: msbuild VisioAutomation_2010\VisioAutomation2010.sln -p:Configuration=Debug -m
