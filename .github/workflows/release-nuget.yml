name: Release VisioAutomation NuGet

# Manual-trigger workflow for cutting a binary release of the
# VisioAutomation NuGet. Reads the version from
# NuGet/VisioAutomation2010.nuspec, builds the solution Debug,
# packs the .nupkg and a raw-DLL zip, and creates a GitHub Release
# tagged VisioAutomation_<version> with both attached.
#
# Does NOT publish to nuget.org. That's a separate workflow planned
# for after this one is proven to work end-to-end.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: build artifacts but do not create the GitHub Release or push the tag'
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # to push the tag and create the GitHub Release

concurrency:
  group: release-nuget
  cancel-in-progress: false

jobs:
  release:
    name: Release VisioAutomation NuGet
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history so tag-existence check sees all tags

      - name: Setup MSBuild (Visual Studio 2022)
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      # The .NET Framework 4.5.2 reference assemblies are supplied by the
      # Microsoft.NETFramework.ReferenceAssemblies.net452 package; no dev-pack
      # install needed. See VisioAutomation_2010/Directory.Packages.props.

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('VisioAutomation_2010/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution NuGet packages
        run: msbuild VisioAutomation_2010\VisioAutomation2010.sln -t:Restore

      - name: Build solution (Debug)
        run: msbuild VisioAutomation_2010\VisioAutomation2010.sln -p:Configuration=Debug -m

      - name: Read version and check tag does not exist
        id: version
        shell: pwsh
        run: |
          [xml]$nuspec = Get-Content NuGet\VisioAutomation2010.nuspec
          $version = $nuspec.package.metadata.version
          if (-not $version) { throw "Could not read <version> from VisioAutomation2010.nuspec" }
          $tag = "VisioAutomation_$version"
          $existing = git tag -l $tag
          if ($existing) { throw "Tag '$tag' already exists. Bump <version> in NuGet\VisioAutomation2010.nuspec first." }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"
          Write-Host "Tag    : $tag"

      - name: Acquire nuget.exe
        shell: pwsh
        run: |
          & .\NuGet\AcquireNuGetExe.ps1
          $nuget = Join-Path $env:LOCALAPPDATA 'NuGetCommandLine\nuget.exe'
          "NUGET_EXE=$nuget" >> $env:GITHUB_ENV

      - name: Pack NuGet package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          & $env:NUGET_EXE pack NuGet\VisioAutomation2010.nuspec -OutputDirectory artifacts
          if ($LASTEXITCODE -ne 0) { throw "nuget pack failed (exit $LASTEXITCODE)" }

      - name: Build raw-DLL zip
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $bin = 'VisioAutomation_2010\VisioScripting\bin\Debug'
          $staging = 'artifacts\binaries'
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          # Same DLL list as the nuspec <files> section -- keep these in sync
          $patterns = @(
            'Microsoft.Office.Interop.Visio.dll',
            'GenTreeOps.dll',
            'Microsoft.Msagl.dll',
            'VisioAutomation*.dll',
            'VisioScripting*.dll'
          )
          foreach ($p in $patterns) {
            $matches = Get-ChildItem -Path (Join-Path $bin $p) -ErrorAction SilentlyContinue
            if (-not $matches) { throw "No files matched pattern '$p' in $bin" }
            $matches | Copy-Item -Destination $staging -Force
          }
          $zipPath = "artifacts\VisioAutomation2010-binaries-$version.zip"
          Compress-Archive -Path "$staging\*" -DestinationPath $zipPath -Force
          Write-Host "Artifacts:"
          Get-ChildItem artifacts -File | ForEach-Object { Write-Host "  $($_.Name)  ($([math]::Round($_.Length/1KB,1)) KB)" }

      - name: Upload workflow artifacts (always, including dry-runs)
        uses: actions/upload-artifact@v4
        with:
          name: VisioAutomation-${{ steps.version.outputs.version }}
          path: |
            artifacts/*.nupkg
            artifacts/*.zip

      - name: Build release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          # Source the release body from NuGet/CHANGELOG.md's [<version>]
          # section. Convention: contributors accumulate entries under
          # [Unreleased], then on release-prep roll [Unreleased] -> [<version>]
          # in the version-bump commit. The workflow reads the rolled section,
          # not [Unreleased] (which is the staging area for the *next* release).
          $version = '${{ steps.version.outputs.version }}'
          $changelogPath = 'NuGet\CHANGELOG.md'
          $content = Get-Content -Raw $changelogPath
          $escapedVersion = [regex]::Escape($version)
          $pattern = "(?ms)^## \[$escapedVersion\][^\r\n]*\r?\n(.*?)(?=^## |\z)"
          $regexMatch = [regex]::Match($content, $pattern)
          if (-not $regexMatch.Success) {
            throw "Could not find [$version] section in $changelogPath. Roll [Unreleased] -> [$version] in the version-bump commit before triggering the release workflow."
          }
          $changelogSection = $regexMatch.Groups[1].Value.Trim()
          if (-not $changelogSection) {
            throw "[$version] section in $changelogPath is empty. Nothing to release."
          }

          # Build the release-notes body as a string array, NOT as a PowerShell
          # here-string. PowerShell requires the closing `'@` marker at column 0
          # of its line; YAML literal block scalars (`run: |`) require every
          # content line to be indented at or beyond the parent's indent. Those
          # two rules are mutually exclusive, so here-strings cannot be used
          # inside a `run: |` block. Each line below is its own string.
          $lines = @()
          $lines += $changelogSection
          $lines += ''
          $lines += '## Artifacts'
          $lines += ''
          $lines += "- ``VisioAutomation2010.$version.nupkg`` is the NuGet package. Place in a folder, add that folder as a NuGet package source for your project, then ``Install-Package VisioAutomation2010``."
          $lines += "- ``VisioAutomation2010-binaries-$version.zip`` is the raw DLLs for projects that do not use NuGet."
          $lines += ''
          $lines += '## Related'
          $lines += ''
          $lines += '- The companion [Visio PowerShell module](https://www.powershellgallery.com/packages/Visio) wraps this NuGet for PowerShell use.'
          $lines += '- [Project documentation](https://saveenr.gitbook.io/visioautomation/).'
          $lines += '- [Full changelog](https://github.com/saveenr/VisioAutomation/blob/master/NuGet/CHANGELOG.md).'
          $body = $lines -join "`n"
          $notesPath = "release-notes-$version.md"
          $body | Set-Content -Path $notesPath -Encoding utf8
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT
          Write-Host "----- Generated release notes -----"
          Write-Host $body
          Write-Host "----- End -----"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: VisioAutomation ${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: |
            artifacts/*.nupkg
            artifacts/*.zip
          fail_on_unmatched_files: true
