name: Release Visio PowerShell module

# Manual-trigger workflow for cutting a binary release of the Visio
# PowerShell module. Reads the version from Visio.psd1, builds the
# solution Debug, stages the module's bin/Debug into a zip, and
# creates a GitHub Release tagged VisioPS_<version> with the zip
# attached.
#
# Does NOT publish to PowerShell Gallery. That's a separate workflow
# planned for after this one is proven; the canonical publish flow
# already exists at VisioAutomation_2010/VisioPowerShell/Publish-VisioPSToGallery.ps1
# and the PSGallery workflow will wrap that script.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: build artifacts but do not create the GitHub Release or push the tag'
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # to push the tag and create the GitHub Release

concurrency:
  group: release-psmodule
  cancel-in-progress: false

jobs:
  release:
    name: Release Visio PowerShell module
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history so tag-existence check sees all tags

      - name: Setup MSBuild (Visual Studio 2022)
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      # Mirror build.yml: shipping libs target .NET Framework 4.5.2,
      # whose reference assemblies aren't on the runner image.
      # Phase 3 will bump TFMs to 4.7.2 and this step can be deleted.
      - name: Install .NET Framework 4.5.2 Developer Pack
        run: choco install netfx-4.5.2-devpack -y --no-progress

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: VisioAutomation_2010/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('VisioAutomation_2010/**/packages.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution NuGet packages
        run: msbuild VisioAutomation_2010\VisioAutomation2010.sln -t:Restore -p:RestorePackagesConfig=true

      - name: Build solution (Debug)
        run: msbuild VisioAutomation_2010\VisioAutomation2010.sln -p:Configuration=Debug -m

      - name: Read module version and check tag does not exist
        id: version
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile VisioAutomation_2010\VisioPowerShell\Visio.psd1
          $version = $manifest.ModuleVersion
          if (-not $version) { throw "Could not read ModuleVersion from Visio.psd1" }
          $tag = "VisioPS_$version"
          $existing = git tag -l $tag
          if ($existing) { throw "Tag '$tag' already exists. Bump ModuleVersion in Visio.psd1 first." }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"
          Write-Host "Tag    : $tag"

      - name: Stage module folder and build zip
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $bin = 'VisioAutomation_2010\VisioPowerShell\bin\Debug'
          $staging = 'artifacts\Visio'
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          # Mirror bin/Debug into the staging folder. Same content
          # InstallForCurrentUser.ps1 copies for dev installs, just to
          # a workspace path instead of $home\Documents\WindowsPowerShell\Modules.
          Copy-Item -Path "$bin\*" -Destination $staging -Recurse -Force
          # Sanity-check that the manifest and key DLLs landed
          $required = @('Visio.psd1', 'Visio.Types.ps1xml', 'VisioPS.dll', 'VisioScripting.dll')
          foreach ($f in $required) {
            $p = Join-Path $staging $f
            if (-not (Test-Path $p)) { throw "Staged module is missing required file: $f" }
          }
          # Verify staged manifest has the expected version
          $stagedVersion = (Import-PowerShellDataFile (Join-Path $staging 'Visio.psd1')).ModuleVersion
          if ($stagedVersion -ne $version) {
            throw "Staged Visio.psd1 has version $stagedVersion but expected $version. Did the build copy a stale manifest?"
          }
          # Zip it
          $zipPath = "artifacts\Visio-$version.zip"
          Compress-Archive -Path "$staging\*" -DestinationPath $zipPath -Force
          Write-Host "Artifacts:"
          Get-ChildItem artifacts -File | ForEach-Object { Write-Host "  $($_.Name)  ($([math]::Round($_.Length/1KB,1)) KB)" }

      - name: Upload workflow artifacts (always, including dry-runs)
        uses: actions/upload-artifact@v4
        with:
          name: VisioPS-${{ steps.version.outputs.version }}
          path: artifacts/Visio-*.zip

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Visio PowerShell ${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            Visio PowerShell module binary release. See [`VisioAutomation_2010/VisioPowerShell/CHANGELOG.md`](VisioAutomation_2010/VisioPowerShell/CHANGELOG.md) for the changelog.

            ## Artifacts

            - `Visio-${{ steps.version.outputs.version }}.zip` &mdash; the staged module folder. Extract to `$home\Documents\WindowsPowerShell\Modules\Visio` (Windows PowerShell 5.1) or `$home\Documents\PowerShell\Modules\Visio` (PowerShell 7+) to install.

            For automated install from PowerShell Gallery use `Install-Module Visio`.
          files: artifacts/Visio-*.zip
          fail_on_unmatched_files: true
